<svg xmlns="http://www.w3.org/2000/svg" width="760" height="342" viewBox="0 0 760 342" role="img" aria-label="Hive Ecosystem stats">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: url(#accent); }
    .repo-name { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #f0f6fc; }
    .stat { font: 13px 'SFMono-Regular', Consolas, Menlo, monospace; fill: #c9d1d9; }
    .stat-dim { font: 13px 'SFMono-Regular', Consolas, Menlo, monospace; fill: #8b949e; }
    .sep { stroke: #30363d; stroke-width: 1; }
  </style>
  <rect width="760" height="342" rx="12" fill="url(#bg)" stroke="#30363d"/>
  <text x="24" y="34" class="title">🐝 Hive Ecosystem — Stats en vivo</text>
  <line x1="0" y1="56" x2="760" y2="56" class="sep"/>
  
    <g transform="translate(0, 83)">
      <text x="32" y="5" class="repo-name">🐝 Hive</text>
      <text x="420" y="5" class="stat">⭐ 49</text>
      <text x="500" y="5" class="stat">🍴 14</text>
      <text x="580" y="5" class="stat-dim">TypeScript</text>
      <text x="728" y="5" class="stat-dim" text-anchor="end">hoy</text>
    </g>

    <g transform="translate(0, 137)">
      <text x="32" y="5" class="repo-name">📚 HiveLearn</text>
      <text x="420" y="5" class="stat">⭐ 1</text>
      <text x="500" y="5" class="stat">🍴 0</text>
      <text x="580" y="5" class="stat-dim">TypeScript</text>
      <text x="728" y="5" class="stat-dim" text-anchor="end">hace 2m</text>
    </g>

    <g transform="translate(0, 191)">
      <text x="32" y="5" class="repo-name">🛠️ HiveCode</text>
      <text x="420" y="5" class="stat">⭐ 0</text>
      <text x="500" y="5" class="stat">🍴 0</text>
      <text x="580" y="5" class="stat-dim">TypeScript</text>
      <text x="728" y="5" class="stat-dim" text-anchor="end">hace 1m</text>
    </g>

    <g transform="translate(0, 245)">
      <text x="32" y="5" class="repo-name">🧰 Hive SDK</text>
      <text x="420" y="5" class="stat">⭐ 0</text>
      <text x="500" y="5" class="stat">🍴 0</text>
      <text x="580" y="5" class="stat-dim">TypeScript</text>
      <text x="728" y="5" class="stat-dim" text-anchor="end">ayer</text>
    </g>

    <g transform="translate(0, 299)">
      <text x="32" y="5" class="repo-name">⚡ Hive-CLI</text>
      <text x="420" y="5" class="stat">⭐ 0</text>
      <text x="500" y="5" class="stat">🍴 0</text>
      <text x="580" y="5" class="stat-dim">C++</text>
      <text x="728" y="5" class="stat-dim" text-anchor="end">hace 2m</text>
    </g>
</svg>
